<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{APP_NAME}} · 页面流程线框图</title>
<style>
  :root {
    --ink: #33373d;        /* 主文字：近黑但偏柔 */
    --line: #b7bcc2;        /* 图标/中性线条 */
    --line-soft: #ededf0;   /* 分割线：极浅 */
    --hairline: #e6e7ea;    /* 卡片发丝边 */
    --fill: #f6f7f8;        /* 浅填充（图标底、输入框） */
    --fill-2: #eef0f2;      /* 次级填充（己方气泡） */
    --bg: #f3f4f6;          /* 页面背景：干净冷白灰 */
    --muted: #9aa0a6;       /* 次要文字 */
    --white: #ffffff;

    /* 标注操作层专用（仅用于工具栏/图钉/弹窗这套覆盖 UI，不参与线框本身） */
    --anno-danger: #e2553d;        /* 删除/危险态：低饱和砖红 */
    --anno-danger-soft: #fbeae6;   /* 危险态浅底 */
    --anno-shadow: 0 1px 2px rgba(33,37,41,0.04), 0 8px 24px rgba(33,37,41,0.08), 0 24px 48px rgba(33,37,41,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "PingFang SC", "Helvetica Neue", "Microsoft YaHei", system-ui, sans-serif;
    background:
      radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg) 60%);
    background-attachment: fixed;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    padding: 0;
  }

  /* 缩放舞台：包住 .canvas，负责居中 + 撑出滚动尺寸。
     其 width/height 由 JS 设为「画布原始尺寸 × 缩放比」，body 滚动条据此跟随缩放后的视觉大小。 */
  .zoom-stage {
    margin: 0 auto;
    position: relative;
  }

  /* 画布容器：宽度由内容决定。绝对定位脱离文档流，尺寸不再污染 .zoom-stage；
     transform-origin 左上角，缩放从 (0,0) 发生，便于光标定位缩放的数学计算。 */
  .canvas {
    width: max-content;
    padding: 40px 48px 90px;
    position: absolute;   /* 作为跨页连线 overlay(.xlink-overlay) 的定位上下文；并脱流交给 .zoom-stage 量尺寸 */
    top: 0; left: 0;
    transform-origin: 0 0;
  }

  .page-header {
    margin: 0 0 56px;
    text-align: center;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .page-header p {
    margin-top: 14px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  /* 可编辑标题：保持上下块级结构；高亮背景仅包裹文字（fit-content + 居中） */
  .page-header [contenteditable] {
    display: block;
    width: fit-content;
    max-width: 100%;
    margin-left: auto; margin-right: auto;
    border-radius: 6px;
    padding: 2px 8px;
    cursor: text;
    transition: background .15s, box-shadow .15s;
    outline: none;
  }
  /* 副标题与标题间距保留（h1 自带 margin-top:14px 在 p 上） */
  .page-header [contenteditable]:hover { background: rgba(0,0,0,0.035); }
  .page-header [contenteditable]:focus {
    background: var(--white);
    box-shadow: 0 0 0 1.5px var(--ink);
  }
  /* 内容为空时显示占位提示，避免编辑框塌缩成看不见 */
  .page-header [contenteditable]:empty::before {
    content: attr(data-placeholder);
    color: var(--line);
  }

  /* 横向流程：页面卡片 + 箭头
     —— 固定横排、绝不换行；窗口装不下时整页横向滚动，保证布局始终正确 */
  .flow {
    display: flex;
    align-items: flex-start;
    flex-wrap: nowrap;
    gap: 4px;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .stage-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1.5px;
    font-weight: 500;
  }

  /* 流程箭头 */
  .arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    min-width: 118px;
    padding-top: 400px;   /* 让箭头大致对齐到页面纵向中部（页面高 812） */
  }
  /* 用原生 SVG 一体绘制：直线 + 箭头，不再拼接，绝不错位 */
  .arrow .line { color: var(--line); display: block; line-height: 0; }
  .arrow .line svg { display: block; width: 104px; height: 12px; }
  .arrow .tag {
    font-size: 11px;
    letter-spacing: 0.3px;
    white-space: nowrap;
    text-align: center;
    color: var(--muted);
  }

  /* ===== 分支流程（同一来源分出多条路线，支持任意行数 / 任意位置分叉 / 嵌套）=====
     结构：
       <div class="flow branched">
         …可选前置 .stage/.arrow…           （分叉点也可在中间某页之后）
         <div class="stage origin">…</div>   （分叉来源页：连线从它右侧中点发出）
         <div class="fork"></div>            （占位列，预留连线空间；连线由 JS 画进 SVG overlay）
         <div class="branches">
           <div class="branch" data-tag="点击「X」">…一行子流程…</div>
           <div class="branch" data-tag="点击「Y」">… N 行皆可 …</div>
         </div>
       </div>
     连线（折线 + 标准箭头 + tag）全部由 JS(drawForks) 按真实 DOM 坐标绘制，
     因此与行数、各行高度、分叉位置无关，且天然支持 .branch 内再嵌套 .fork。 */
  .flow.branched { align-items: center; position: relative; }
  .flow.branched > .stage.origin { align-self: center; }

  /* .fork 仅作占位列，撑出连线所需的水平空间；实际线条画在 .fork-overlay 里 */
  .fork {
    align-self: stretch;
    width: 150px;
    flex-shrink: 0;
  }

  /* 覆盖整个 .branched 区域的 SVG 画布，承载所有分叉连线（不拦截鼠标） */
  .fork-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 1;
  }
  .fork-overlay path { stroke: var(--line); stroke-width: 1; fill: none; }
  /* 分叉线上的入口标注（JS 定位到每行入口箭头上方，样式同普通 .arrow .tag） */
  .fork-tag {
    position: absolute;
    font-size: 11px;
    letter-spacing: 0.3px;
    white-space: nowrap;
    text-align: left;
    color: var(--muted);
    transform: translateY(-100%);   /* 上移到线上方；水平方向左对齐到 left（线的左端） */
    pointer-events: none;
    z-index: 2;
  }

  /* ===== 跨页连线 xlink：在任意两个页面框之间画连接线（支持多条汇聚到同一页框）=====
     用法：给目标页 .screen（或任意块）加 id；在 .canvas 内任意处放一个
       <div class="xlink" data-from="起点id" data-to="终点id" data-tag="说明"
            data-side="auto|right|left|top|bottom"></div>
     连线由 JS(drawXlinks) 画进 .canvas 级别的 SVG overlay，按真实坐标走正交折线 + 箭头。
     与分支连线(drawForks)独立，可共存。曲线走“源右/目标左”优先，自动避免穿页。 */
  .xlink { display: none; }   /* 占位声明，本身不渲染 */
  .xlink-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 3;               /* 高于分支 overlay(1)，浮在页面之上、低于标注图钉(50) */
  }
  .xlink-overlay path { stroke: var(--line); stroke-width: 1; fill: none; }
  /* 跨页连线虚线变体：用 data-dash 触发，区分“次要/返回”类跳转 */
  .xlink-overlay path.dashed { stroke-dasharray: 4 4; }
  .xlink-tag {
    position: absolute;
    font-size: 11px;
    letter-spacing: 0.3px;
    white-space: nowrap;
    color: var(--muted);
    background: var(--bg);    /* 给文字垫一层页面底色，压住其下穿过的连线，保证可读 */
    padding: 0 4px;
    pointer-events: none;
    z-index: 4;
    transform: translate(-50%, -50%);   /* 锚到折线中点 */
  }

  .branches {
    display: flex;
    flex-direction: column;
    gap: 48px;
    flex-shrink: 0;
  }
  .branch {
    display: flex;
    align-items: flex-start;
    flex-wrap: nowrap;
    gap: 4px;
  }

  /* ===== 简洁页面卡片（无手机壳 / 无状态栏） ===== */
  /* 采用 iOS 标准逻辑宽度 375pt，比例对齐 iPhone（375×812）。
     高度用 min-height：内容少时维持标准 812 高，内容多时整页向下延长、完整展示（原型无需半遮挡滚动） */
  .screen {
    width: 375px;
    min-height: 812px;
    background: var(--white);
    border: 1px solid var(--hairline);
    border-radius: 30px;
    overflow: hidden;        /* 仅护住圆角；高度由 min-height 决定，内容多时整体长高、不裁切 */
    display: flex;
    flex-direction: column;
    box-shadow:
      0 1px 2px rgba(33, 37, 41, 0.04),
      0 8px 24px rgba(33, 37, 41, 0.06),
      0 24px 48px rgba(33, 37, 41, 0.05);
  }

  /* 顶部导航：标题 Headline 17pt */
  .navbar {
    height: 56px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--line-soft);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .navbar .nav-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    background: transparent;
  }
  .navbar .nav-btn.ghost { border: none; background: none; }
  .navbar .title { flex: 1; text-align: center; }

  .body { flex: 1; }

  /* ===== 通用 list 项 ===== */
  .list-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line-soft);
  }
  .list-item:last-child { border-bottom: none; }
  .list-item .ic {
    width: 44px; height: 44px;
    flex-shrink: 0;
    border-radius: 12px;
    background: var(--fill);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .list-item .txt { flex: 1; min-width: 0; }
  .list-item .txt .t1 { font-size: 17px; font-weight: 600; color: var(--ink); letter-spacing: 0.2px; line-height: 1.3; }
  .list-item .txt .t2 { font-size: 15px; color: var(--muted); margin-top: 3px; line-height: 1.35; }
  .list-item .chev { color: var(--line); display: flex; flex-shrink: 0; }

  .section-cap {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 22px 20px 10px;
  }

  /* ===== 对话页 ===== */
  .chat-hero {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--line-soft);
    background: var(--white);
  }
  .chat-hero .avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--fill);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-hero .name { font-size: 17px; font-weight: 600; letter-spacing: 0.2px; }
  .chat-hero .sub { font-size: 13px; color: var(--muted); }

  /* 位置权限提示条 */
  .perm-tip {
    flex-shrink: 0;
    margin: 16px 16px 4px;
    border-radius: 14px;
    background: var(--fill);
    padding: 13px 15px;
    display: flex;
    align-items: center;
    gap: 13px;
  }
  .perm-tip .pic {
    width: 36px; height: 36px;
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--white);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .perm-tip .ptxt { flex: 1; min-width: 0; }
  .perm-tip .ptxt .pt1 { font-size: 15px; font-weight: 600; color: var(--ink); }
  .perm-tip .ptxt .pt2 { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .perm-tip .pbtn {
    flex-shrink: 0;
    font-size: 14px;
    color: var(--white);
    background: var(--ink);
    border-radius: 16px;
    padding: 7px 15px;
  }

  .chat-stream {
    flex: 1;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .bubble {
    max-width: 78%;
    font-size: 17px;
    line-height: 1.45;
    padding: 11px 15px;
    border-radius: 20px;
  }
  .bubble.in {
    align-self: flex-start;
    background: var(--fill);
    color: var(--ink);
    border-bottom-left-radius: 5px;
  }
  .bubble.out {
    align-self: flex-end;
    background: var(--ink);
    color: var(--white);
    border-bottom-right-radius: 5px;
  }
  .bubble.out .who { color: rgba(255,255,255,0.55); }
  .bubble .who {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .chat-input {
    flex-shrink: 0;
    height: 60px;
    border-top: 1px solid var(--line-soft);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
  }
  .chat-input .field {
    flex: 1;
    height: 40px;
    border-radius: 20px;
    background: var(--fill);
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 15px;
    color: var(--muted);
  }
  .chat-input .send {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-input .send [data-lucide] { color: var(--white); }

  /* ===== 设置项（开关 / 危险项，仅静态展示） ===== */
  .switch {
    width: 51px; height: 31px;
    border-radius: 16px;
    background: var(--line-soft);
    position: relative;
    flex-shrink: 0;
    transition: background .2s;
  }
  .switch .knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 27px; height: 27px;
    border-radius: 50%;
    background: var(--white);
    box-shadow: 0 1px 3px rgba(33,37,41,0.2);
    transition: left .2s;
  }
  .switch.on { background: var(--ink); }
  .switch.on .knob { left: 22px; }

  /* ===== 统计页 ===== */
  .stat-scroll { flex: 1; }

  /* 顶部数字摘要 */
  .stat-summary {
    display: flex;
    padding: 24px 12px 20px;
    border-bottom: 1px solid var(--line-soft);
  }
  .stat-summary .stat {
    flex: 1;
    text-align: center;
    position: relative;
  }
  .stat-summary .stat + .stat::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 1px; height: 30px;
    background: var(--line-soft);
  }
  .stat-summary .stat .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .stat-summary .stat .num small {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-left: 2px;
  }
  .stat-summary .stat .lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 7px;
    letter-spacing: 0.3px;
  }

  /* 探索进度 */
  .stat-progress { padding: 20px 20px 6px; }
  .stat-progress .pg-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 11px;
  }
  .stat-progress .pg-head .pg-title { font-size: 15px; font-weight: 600; color: var(--ink); }
  .stat-progress .pg-head .pg-meta { font-size: 13px; color: var(--muted); }
  .stat-progress .pg-track {
    height: 10px;
    border-radius: 5px;
    background: var(--fill);
    overflow: hidden;
  }
  .stat-progress .pg-fill {
    height: 100%;
    border-radius: 5px;
    background: var(--ink);
  }

  /* 柱状图 */
  .chart-block { padding: 22px 20px 18px; }
  .chart-block .ch-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    height: 200px;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
  }
  .bar-col .bar-track {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    gap: 7px;
  }
  .bar-col .bar-cap { font-size: 12px; font-weight: 600; color: var(--ink); }
  .bar-col .bar {
    width: 70%;
    max-width: 30px;
    border-radius: 7px 7px 0 0;
    background: var(--fill-2);
  }
  .bar-col.hot .bar { background: var(--ink); }
  .bar-col .bar-lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 9px;
    letter-spacing: 0.2px;
  }

  /* ============================================================
     扩展组件库（新增——只复用上面已有的 9 个颜色变量与 HIG 字号档，
     绝不改动任何锁定值。覆盖主流 App 的高频形态：Tab Bar / 卡片 /
     搜索栏 / 宫格 / 横滑 / 商品卡 / Feed / 表单 / 时间线 / 空状态 等）
     ============================================================ */

  /* ===== A. 框架 chrome ===== */

  /* A1. 底部 Tab Bar：贴 .screen 底部，4–5 个 .tab，.active 用墨色 */
  .tabbar {
    flex-shrink: 0;
    display: flex;
    border-top: 1px solid var(--line-soft);
    background: var(--white);
    padding: 8px 6px 10px;
  }
  .tabbar .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--muted);
  }
  .tabbar .tab .tlabel { font-size: 11px; letter-spacing: 0.2px; }
  .tabbar .tab [data-lucide] { width: 24px; height: 24px; color: var(--muted); }
  .tabbar .tab.active { color: var(--ink); }
  .tabbar .tab.active [data-lucide] { color: var(--ink); }

  /* A2. 搜索栏：圆角浅底 + 左侧放大镜 + 占位文字 */
  .searchbar {
    margin: 12px 16px;
    height: 40px;
    border-radius: 12px;
    background: var(--fill);
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 0 14px;
  }
  .searchbar [data-lucide] { width: 18px; height: 18px; color: var(--muted); flex-shrink: 0; }
  .searchbar .sph { font-size: 15px; color: var(--muted); }

  /* A3. 分段控制器（iOS segmented control） */
  .segment {
    margin: 12px 16px;
    display: flex;
    background: var(--fill);
    border-radius: 10px;
    padding: 3px;
    gap: 3px;
  }
  .segment .seg {
    flex: 1;
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    padding: 7px 0;
    border-radius: 8px;
  }
  .segment .seg.active {
    background: var(--white);
    color: var(--ink);
    font-weight: 600;
    box-shadow: 0 1px 3px rgba(33,37,41,0.1);
  }

  /* A4. 底部 CTA 操作栏：贴底、一到两个大按钮 */
  .cta-bar {
    flex-shrink: 0;
    border-top: 1px solid var(--line-soft);
    background: var(--white);
    padding: 12px 16px 16px;
    display: flex;
    gap: 10px;
  }

  /* ===== 通用按钮（CTA / 卡片内 / 表单皆可用） ===== */
  .btn {
    flex: 1;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .btn [data-lucide] { width: 18px; height: 18px; }
  .btn.primary { background: var(--ink); color: var(--white); }
  .btn.primary [data-lucide] { color: var(--white); }
  .btn.ghost { background: var(--fill); color: var(--ink); }
  .btn.outline { background: var(--white); color: var(--ink); border: 1px solid var(--hairline); }
  /* 小尺寸按钮（卡片内 / 行内用） */
  .btn.sm { height: 36px; border-radius: 10px; font-size: 14px; flex: 0 0 auto; padding: 0 16px; }

  /* ===== B. 内容容器 ===== */

  /* B1. 通用卡片 */
  .card {
    margin: 12px 16px;
    background: var(--white);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    overflow: hidden;
  }
  .card .card-hd {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line-soft);
  }
  .card .card-hd .ct { font-size: 15px; font-weight: 600; color: var(--ink); }
  .card .card-hd .cmore { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 2px; }
  .card .card-hd .cmore [data-lucide] { width: 15px; height: 15px; color: var(--line); }
  .card .card-bd { padding: 14px 16px; }
  /* 卡片内若直接放 .list-item，去掉左右额外内距让分隔线通栏 */
  .card .list-item { padding-left: 16px; padding-right: 16px; }

  /* B2. 功能宫格（九宫格入口） */
  .grid {
    display: flex;
    flex-wrap: wrap;
    padding: 8px 8px 4px;
  }
  .grid .grid-item {
    width: 25%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 12px 4px;
  }
  .grid .grid-item .gic {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: var(--fill);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .grid .grid-item .gic [data-lucide] { width: 24px; height: 24px; }
  .grid .grid-item .glabel { font-size: 12px; color: var(--ink); letter-spacing: 0.2px; text-align: center; }

  /* B3. 横向滚动卡片 */
  .hscroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 4px 16px 8px;
    -webkit-overflow-scrolling: touch;
  }
  .hscroll .hcard {
    flex: 0 0 auto;
    width: 140px;
  }
  .hscroll .hcard .htitle { font-size: 15px; font-weight: 600; color: var(--ink); margin-top: 8px; line-height: 1.3; }
  .hscroll .hcard .hsub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* B4. Banner / 轮播占位 */
  .banner {
    margin: 12px 16px;
    height: 140px;
    border-radius: 14px;
    background: var(--fill);
    color: var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .banner [data-lucide] { width: 32px; height: 32px; color: var(--line); }
  .banner .dots {
    position: absolute;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }
  .banner .dots i {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--line);
    display: block;
  }
  .banner .dots i.on { background: var(--ink); width: 16px; border-radius: 3px; }

  /* ===== C. 媒体 / 列表变体 ===== */

  /* C0. 通用缩略图占位（卡片 / 媒体 / 商品复用） */
  .thumb {
    background: var(--fill);
    color: var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    overflow: hidden;
  }
  .thumb [data-lucide] { width: 24px; height: 24px; color: var(--line); }

  /* C1. 媒体列表项：左缩略图 + 右文案 */
  .media-item {
    display: flex;
    gap: 13px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line-soft);
  }
  .media-item:last-child { border-bottom: none; }
  .media-item .thumb { width: 72px; height: 72px; flex-shrink: 0; }
  .media-item .mtxt { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .media-item .mtxt .m1 { font-size: 17px; font-weight: 600; color: var(--ink); line-height: 1.3; }
  .media-item .mtxt .m2 { font-size: 15px; color: var(--muted); margin-top: 3px; line-height: 1.35; }
  .media-item .mtxt .m3 { font-size: 12px; color: var(--line); margin-top: auto; padding-top: 6px; letter-spacing: 0.2px; }

  /* ===== D. 电商：商品卡网格 ===== */
  .product-grid {
    display: flex;
    flex-wrap: wrap;
    padding: 8px 12px;
    gap: 12px;
  }
  .product-grid .product {
    width: calc(50% - 6px);
    background: var(--white);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    overflow: hidden;
  }
  .product .thumb { width: 100%; height: 150px; border-radius: 0; }
  .product .pinfo { padding: 10px 12px 12px; }
  /* 标题恒占两行高度（单行也预留第二行的空间），保证同排卡片的价格行与加购钮始终水平对齐——
     单行/双行混排不再错位。超过两行截断。 */
  .product .pname {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.35;
    height: 2.7em;             /* = 2 行（line-height 1.35 × 2） */
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .product .prow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .product .price { font-size: 17px; font-weight: 600; color: var(--ink); }
  .product .price small { font-size: 12px; font-weight: 500; margin-right: 1px; }
  .product .add {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .product .add [data-lucide] { width: 16px; height: 16px; color: var(--white); }

  /* ===== E. 社交 / Feed ===== */
  .feed-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line-soft);
  }
  .feed-item:last-child { border-bottom: none; }
  .feed-item .fhead { display: flex; align-items: center; gap: 10px; }
  .feed-item .fhead .fname { font-size: 15px; font-weight: 600; color: var(--ink); }
  .feed-item .fhead .ftime { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .feed-item .ftext { font-size: 15px; color: var(--ink); line-height: 1.5; margin-top: 11px; }
  .feed-item .fmedia { width: 100%; height: 180px; margin-top: 11px; }
  .feed-item .facts {
    display: flex;
    gap: 28px;
    margin-top: 13px;
  }
  .feed-item .facts .fact {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
  }
  .feed-item .facts .fact [data-lucide] { width: 18px; height: 18px; color: var(--muted); }

  /* 评论行 */
  .comment {
    display: flex;
    gap: 10px;
    padding: 12px 20px;
  }
  .comment .ctext { flex: 1; min-width: 0; }
  .comment .ctext .cname { font-size: 13px; font-weight: 600; color: var(--ink); }
  .comment .ctext .cbody { font-size: 15px; color: var(--ink); line-height: 1.45; margin-top: 2px; }

  /* 小头像（Feed / 评论 / 列表通用） */
  .avatar-sm {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--fill);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    font-weight: 600;
  }
  .avatar-sm [data-lucide] { width: 20px; height: 20px; }

  /* ===== F. 表单 / 小部件 / 状态 ===== */

  /* F1. 表单输入（静态展示，含已填 / 占位两态） */
  .form-field { padding: 8px 20px; }
  .form-field .flabel { font-size: 13px; color: var(--muted); letter-spacing: 0.2px; margin-bottom: 7px; }
  .form-field .finput {
    min-height: 44px;
    border-radius: 10px;
    background: var(--fill);
    display: flex;
    align-items: center;
    padding: 10px 14px;
    font-size: 15px;
    color: var(--ink);
  }
  .form-field .finput.ph { color: var(--line); }      /* 占位态 */
  .form-field .finput.area { min-height: 88px; align-items: flex-start; }

  /* F2. 标签 / 筛选胶囊 */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 16px;
  }
  .chips .chip {
    font-size: 13px;
    color: var(--ink);
    background: var(--fill);
    border-radius: 16px;
    padding: 7px 14px;
    letter-spacing: 0.2px;
  }
  .chips .chip.active { background: var(--ink); color: var(--white); }

  /* F3. 空状态 */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 40px;
    gap: 6px;
  }
  .empty .eic {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--fill);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }
  .empty .eic [data-lucide] { width: 32px; height: 32px; color: var(--line); }
  .empty .e1 { font-size: 17px; font-weight: 600; color: var(--ink); }
  .empty .e2 { font-size: 14px; color: var(--muted); line-height: 1.5; }

  /* F4. 步骤 / 时间线（订单进度、流程节点） */
  .timeline { padding: 14px 20px; }
  .timeline .tl-item {
    display: flex;
    gap: 14px;
    position: relative;
    padding-bottom: 22px;
  }
  .timeline .tl-item:last-child { padding-bottom: 0; }
  /* 圆点 + 贯穿竖线 */
  .timeline .tl-item .tl-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--line);
    background: var(--white);
    flex-shrink: 0;
    margin-top: 2px;
    z-index: 1;
  }
  .timeline .tl-item.done .tl-dot { background: var(--ink); border-color: var(--ink); }
  .timeline .tl-item:not(:last-child)::before {
    content: "";
    position: absolute;
    left: 6px; top: 16px;
    width: 2px; bottom: 0;
    background: var(--line-soft);
  }
  .timeline .tl-item .tl-txt { flex: 1; min-width: 0; }
  .timeline .tl-item .tl-1 { font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.3; }
  .timeline .tl-item .tl-2 { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* F5. 星级评分 */
  .rating { display: inline-flex; align-items: center; gap: 2px; }
  .rating [data-lucide] { width: 15px; height: 15px; color: var(--ink); fill: var(--ink); }
  .rating [data-lucide].off { color: var(--line); fill: none; }
  .rating .rnum { font-size: 13px; color: var(--muted); margin-left: 5px; }

  /* 价格强调（详情页大价格） */
  .price-lg { font-size: 28px; font-weight: 700; color: var(--ink); letter-spacing: 0.5px; }
  .price-lg small { font-size: 15px; font-weight: 500; margin-right: 2px; }

  /* ===== G. 地图（线框风：浅网格底 + 定位针 + 可选路线/卡片）===== */
  .map {
    position: relative;
    width: 100%;
    height: 240px;
    background: var(--fill);
    /* 隐约街道网格：两组发丝线交叉，纯 CSS，无图片依赖 */
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 32px 32px;
    overflow: hidden;
  }
  /* 一条斜穿的“主干道”，让地图不那么空 */
  .map .road {
    position: absolute;
    left: -10%; top: 60%;
    width: 130%; height: 6px;
    background: var(--hairline);
    transform: rotate(-18deg);
  }
  .map .road.v {
    left: 38%; top: -10%;
    width: 6px; height: 130%;
    transform: rotate(-18deg);
  }
  /* 居中定位针：圆头 + 尖尾（与标注图钉同款几何，但更大、墨色） */
  .map .pin {
    position: absolute;
    left: 50%; top: 50%;
    width: 30px; height: 30px;
    transform: translate(-50%, -100%);
    background: var(--ink);
    border: 3px solid var(--white);
    border-radius: 50% 50% 50% 3px;
    rotate: -45deg;   /* 尖角朝下，指向地点（逆时针 90°）*/
    box-shadow: 0 4px 10px rgba(33,37,41,0.28);
  }
  .map .pin::after {     /* 针中心白点 */
    content: "";
    position: absolute;
    left: 50%; top: 50%;
    width: 8px; height: 8px;
    background: var(--white);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  /* 浮在地图底部的信息卡（如“距你 1.2km”） */
  .map .map-card {
    position: absolute;
    left: 12px; right: 12px; bottom: 12px;
    background: var(--white);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    box-shadow: var(--anno-shadow);
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .map .map-card .mc-ic {
    width: 38px; height: 38px;
    flex-shrink: 0;
    border-radius: 10px;
    background: var(--fill);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .map .map-card .mc-ic [data-lucide] { width: 20px; height: 20px; }
  .map .map-card .mc-tx { flex: 1; min-width: 0; }
  .map .map-card .mc-1 { font-size: 15px; font-weight: 600; color: var(--ink); }
  .map .map-card .mc-2 { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ===== H. 折线图（内联 SVG，html2canvas 可正常截图）===== */
  /* 结构：.linechart > svg(viewBox 0 0 300 160) + .ln-labels。
     折线 path 用 --ink，面积填充用极淡灰，网格线 --line-soft。坐标由作者按数据填写。 */
  .linechart { padding: 4px 4px 0; }
  .linechart svg { display: block; width: 100%; height: auto; }
  .linechart .ln-grid { stroke: var(--line-soft); stroke-width: 1; }
  .linechart .ln-area { fill: var(--fill-2); opacity: 0.6; }
  .linechart .ln-path { fill: none; stroke: var(--ink); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .linechart .ln-dot { fill: var(--white); stroke: var(--ink); stroke-width: 2; }
  .linechart .ln-labels {
    display: flex;
    justify-content: space-between;
    padding: 8px 6px 0;
  }
  .linechart .ln-labels span { font-size: 12px; color: var(--muted); }

  /* ===== I. 圆环 / 占比图（内联 SVG）===== */
  /* 用 stroke-dasharray 画环。中心可放百分比数字。配图例 .donut-legend。 */
  .donut-wrap { display: flex; align-items: center; gap: 20px; padding: 6px 4px; }
  .donut { position: relative; width: 120px; height: 120px; flex-shrink: 0; }
  .donut svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .donut .d-track { fill: none; stroke: var(--fill-2); stroke-width: 14; }
  .donut .d-seg { fill: none; stroke: var(--ink); stroke-width: 14; stroke-linecap: round; }
  .donut .d-seg.soft { stroke: var(--line); }
  .donut .d-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .donut .d-center .d-num { font-size: 24px; font-weight: 700; color: var(--ink); line-height: 1; }
  .donut .d-center .d-lbl { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .donut-legend { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; }
  .donut-legend .lg-row { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--ink); }
  .donut-legend .lg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; background: var(--ink); }
  .donut-legend .lg-dot.soft { background: var(--line); }
  .donut-legend .lg-dot.faint { background: var(--fill-2); }
  .donut-legend .lg-val { margin-left: auto; color: var(--muted); }

  /* 流程内的列（页面 / 箭头）一律不压缩，保持原尺寸横向排开 */
  .stage, .arrow { flex-shrink: 0; }

  /* ===================== 标注系统（操作层 UI）=====================
     与线框同一套设计语言：发丝边 + 柔和层叠投影 + 大圆角 + 毛玻璃，
     按钮走极简 ghost 风格。仅美化外观，功能与脚本逻辑不变。
     （配色与投影变量见 :root 末尾的 --anno-* 一组） */
  .anno-toolbar {
    position: fixed;
    top: 18px; right: 18px;
    z-index: 9999;
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.82);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    backdrop-filter: saturate(180%) blur(16px);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 6px;
    box-shadow: var(--anno-shadow);
    font-size: 12px;
    align-items: center;
  }
  .anno-toolbar button {
    font: inherit;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--ink);
    border-radius: 9px;
    padding: 7px 12px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .anno-toolbar button:hover { background: var(--fill); }
  .anno-toolbar button:active { background: var(--fill-2); }
  /* 标注模式开关：主按钮，开启时实心墨色 */
  .anno-toolbar button.primary.active {
    background: var(--ink);
    color: var(--white);
    box-shadow: 0 1px 3px rgba(33,37,41,0.18);
  }
  .anno-toolbar button.primary.active:hover { background: #2a2e33; }
  /* 清空：危险操作，hover 显红 */
  .anno-toolbar button.danger:hover { background: var(--anno-danger-soft); color: var(--anno-danger); }
  /* 计数：与按钮之间用发丝竖线分隔 */
  .anno-toolbar .count {
    font-size: 11px;
    color: var(--muted);
    padding: 0 10px 0 8px;
    margin-right: 2px;
    border-right: 1px solid var(--hairline);
    white-space: nowrap;
  }

  /* 缩放控件组：左侧用发丝竖线与标注按钮分隔；±按钮做成等宽方钮，百分比可点（=复位 100%） */
  .anno-toolbar .zoom-group {
    display: flex;
    align-items: center;
    gap: 2px;
    padding-left: 6px;
    margin-left: 4px;
    border-left: 1px solid var(--hairline);
  }
  .anno-toolbar .zoom-group button.zbtn {
    padding: 7px 0;
    width: 30px;
    text-align: center;
    font-size: 15px;
    line-height: 1;
  }
  .anno-toolbar .zoom-group .zpct {
    font: inherit;
    font-weight: 500;
    color: var(--ink);
    background: transparent;
    border: none;
    border-radius: 9px;
    padding: 7px 8px;
    min-width: 46px;
    text-align: center;
    cursor: pointer;
    transition: background .15s;
  }
  .anno-toolbar .zoom-group .zpct:hover { background: var(--fill); }

  /* 进入标注模式时，给可点击区域加十字光标 */
  body.anno-on .screen { cursor: crosshair; }

  /* 按住空格 = 类 Figma 抓手平移画布（用 !important 覆盖标注模式的十字光标） */
  body.space-pan, body.space-pan * { cursor: grab !important; }
  body.space-panning, body.space-panning * { cursor: grabbing !important; }

  /* 图钉 */
  .anno-pin {
    position: absolute;
    width: 24px; height: 24px;
    transform: translate(-50%, -50%);
    background: var(--ink);
    color: var(--white);
    border: 2px solid var(--white);
    border-radius: 50% 50% 50% 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    z-index: 50;
    box-shadow: 0 2px 6px rgba(33,37,41,0.28), 0 1px 2px rgba(33,37,41,0.2);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .anno-pin:hover {
    transform: translate(-50%, -50%) scale(1.12);
    box-shadow: 0 4px 12px rgba(33,37,41,0.34), 0 1px 3px rgba(33,37,41,0.24);
  }

  /* 注释气泡：挂在 body 上、绝对定位（用文档坐标），不再被页面卡片的 overflow 裁切 */
  .anno-pop {
    position: absolute;
    width: 232px;
    background: var(--white);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 13px;
    z-index: 9998;           /* 高于图钉(50)与页面，仅低于导出弹层(10000) */
    box-shadow: var(--anno-shadow);
    animation: annoPopIn .14s ease-out;
  }
  @keyframes annoPopIn {
    from { opacity: 0; transform: translateY(-4px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .anno-pop .meta {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.4;
    letter-spacing: 0.2px;
  }
  .anno-pop textarea {
    width: 100%;
    height: 66px;
    resize: none;
    font: inherit;
    font-size: 12px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--fill);
    border: 1px solid transparent;
    border-radius: 9px;
    padding: 9px 10px;
    outline: none;
    transition: background .15s, box-shadow .15s, border-color .15s;
  }
  .anno-pop textarea::placeholder { color: var(--line); }
  .anno-pop textarea:focus {
    background: var(--white);
    border-color: var(--hairline);
    box-shadow: 0 0 0 3px rgba(51,55,61,0.08);
  }
  .anno-pop .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }
  .anno-pop .row button {
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid transparent;
    background: var(--fill);
    color: var(--ink);
    border-radius: 9px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background .15s, box-shadow .15s, color .15s;
  }
  .anno-pop .row button.save {
    background: var(--ink);
    color: var(--white);
    box-shadow: 0 1px 3px rgba(33,37,41,0.18);
  }
  .anno-pop .row button.save:hover { background: #2a2e33; }
  /* 删除：克制的红色文字按钮，带图标，hover 才铺浅底 */
  .anno-pop .row button.del {
    background: transparent;
    color: var(--anno-danger);
    padding: 7px 12px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .anno-pop .row button.del:hover { background: var(--anno-danger-soft); }
  .anno-pop .row button.del [data-lucide] { width: 14px; height: 14px; color: var(--anno-danger); }

  /* 导出弹层 */
  .anno-modal-mask {
    position: fixed; inset: 0;
    background: rgba(33,37,41,0.28);
    -webkit-backdrop-filter: blur(3px);
    backdrop-filter: blur(3px);
    z-index: 10000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .anno-modal-mask.show { display: flex; animation: annoMaskIn .18s ease-out; }
  @keyframes annoMaskIn { from { opacity: 0; } to { opacity: 1; } }
  .anno-modal {
    width: 520px;
    max-width: 90vw;
    background: var(--white);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 12px 32px rgba(33,37,41,0.18), 0 32px 64px rgba(33,37,41,0.12);
    animation: annoModalIn .2s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes annoModalIn {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .anno-modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 5px; letter-spacing: 0.2px; }
  .anno-modal p { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  .anno-modal textarea {
    width: 100%;
    height: 220px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--fill);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    transition: box-shadow .15s, background .15s;
  }
  .anno-modal textarea:focus { background: var(--white); box-shadow: 0 0 0 3px rgba(51,55,61,0.08); }
  .anno-modal .actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
  }
  .anno-modal .actions button {
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid transparent;
    background: var(--fill);
    color: var(--ink);
    border-radius: 10px;
    padding: 9px 18px;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
  }
  .anno-modal .actions button:hover { background: var(--fill-2); }
  .anno-modal .actions button.primary {
    background: var(--ink);
    color: var(--white);
    box-shadow: 0 1px 3px rgba(33,37,41,0.18);
  }
  .anno-modal .actions button.primary:hover { background: #2a2e33; }

  /* ===================== 图标急救安全网 =====================
     默认隐藏；仅当 Lucide CDN 加载失败（图标空白）时，由脚本加 body.icons-broken 才显示。
     ⚠ 这套 UI 本身绝不依赖任何图标库：问号用纯字符 "?" + CSS 绘制，
       提示与弹窗用纯文本——否则图标坏掉时连求助入口都会是空白，兜底失效。 */
  .icon-sos { display: none; }
  body.icons-broken .icon-sos { display: block; }
  .icon-sos-btn {
    position: fixed;
    right: 20px; bottom: 20px;
    z-index: 9990;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--white);
    border: 1px solid var(--hairline);
    box-shadow: var(--anno-shadow);
    color: var(--muted);
    font-size: 18px;
    font-weight: 600;
    font-family: "PingFang SC", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color .15s, border-color .15s, transform .12s;
  }
  .icon-sos-btn:hover { color: var(--ink); border-color: var(--line); transform: scale(1.06); }
  /* hover 提示气泡：定位在问号上方，纯文本 */
  .icon-sos-tip {
    position: fixed;
    right: 20px; bottom: 64px;
    z-index: 9990;
    max-width: 230px;
    background: var(--ink);
    color: var(--white);
    font-size: 12px;
    line-height: 1.5;
    border-radius: 10px;
    padding: 9px 12px;
    box-shadow: var(--anno-shadow);
    opacity: 0;
    transform: translateY(4px);
    pointer-events: none;
    transition: opacity .15s, transform .15s;
  }
  .icon-sos-btn:hover + .icon-sos-tip { opacity: 1; transform: translateY(0); }

  /* ===================== Lucide 图标统一尺寸/描边 ===================== */
  [data-lucide] { stroke-width: 1.75; color: var(--ink); display: inline-block; vertical-align: middle; }
  .list-item .ic [data-lucide] { width: 24px; height: 24px; }
  .navbar .nav-btn [data-lucide] { width: 20px; height: 20px; }
  .list-item .chev [data-lucide] { width: 20px; height: 20px; color: var(--line); }
  .chat-hero .avatar [data-lucide] { width: 36px; height: 36px; }
  .perm-tip .pic [data-lucide] { width: 18px; height: 18px; }
  .chat-input .send [data-lucide] { width: 18px; height: 18px; }
  /* 扩展组件的图标尺寸大多已在各自规则里就近声明；这里只兜底未覆盖到的情形 */
</style>

<body>

  <div class="zoom-stage">
  <div class="canvas">

  <div class="page-header">
    <h1 id="docTitle" contenteditable="true" spellcheck="false" data-placeholder="点击编辑标题…" title="点击编辑标题">{{APP_NAME}} · 页面流程线框图</h1>
    <p id="docSubtitle" contenteditable="true" spellcheck="false" data-placeholder="点击编辑副标题…" title="点击编辑副标题">各页面平铺罗列，箭头标注页面间的点击与流转</p>
  </div>

  <div class="flow">

    <!-- ┌─────────────────────────────────────────────────────────────┐
         │  在此按顺序插入「页面(.stage)」与「箭头(.arrow)」               │
         │  片段全部来自 components.md，直接复制粘贴后替换文案/图标即可     │
         │                                                               │
         │  结构示例：                                                    │
         │    <div class="stage"> …第①页… </div>                         │
         │    <div class="arrow"> …箭头+流转说明… </div>                  │
         │    <div class="stage"> …第②页… </div>                         │
         │    …                                                          │
         │                                                               │
         │  ⚠ 不要改 <style> 里的任何尺寸/变量；只在这里拼装页面。         │
         └─────────────────────────────────────────────────────────────┘ -->

  </div>

  </div><!-- /.canvas -->
  </div><!-- /.zoom-stage -->

  <!-- ===================== 标注系统 UI ===================== -->
  <div class="anno-toolbar">
    <button id="annoToggle" class="primary">✎ 标注模式：关</button>
    <span class="count"><span id="annoCount">0</span> 条</span>
    <button id="annoExport">导出标注</button>
    <button id="annoShot">下载截图</button>
    <button id="annoClear" class="danger">清空</button>
    <span class="zoom-group">
      <button class="zbtn" id="zoomOut" title="缩小（Ctrl/⌘ + 滚轮 / 触控板捏合）">−</button>
      <button class="zpct" id="zoomPct" title="点击复位 100%">100%</button>
      <button class="zbtn" id="zoomIn" title="放大（Ctrl/⌘ + 滚轮 / 触控板捏合）">＋</button>
      <button id="zoomFit" title="缩小到整张流程图铺满窗口宽度">适应屏幕</button>
    </span>
  </div>

  <div class="anno-modal-mask" id="annoMask">
    <div class="anno-modal">
      <h3>导出标注</h3>
      <p>已自动复制到剪贴板。把下面内容粘贴到对话框发给我即可。</p>
      <textarea id="annoOut" readonly></textarea>
      <div class="actions">
        <button id="annoCopy">再次复制</button>
        <button class="primary" id="annoClose">关闭</button>
      </div>
    </div>
  </div>

  <!-- 图标急救入口：默认隐藏，仅当图标库加载失败时由脚本显示（问号用纯字符，不依赖图标库） -->
  <div class="icon-sos">
    <div class="icon-sos-btn" id="iconSosBtn" title="图标没显示出来？">?</div>
    <div class="icon-sos-tip">图标没显示出来？点这里复制一段话，发给 AI 即可修复</div>
  </div>

<script>
(function () {
  // 每个原型文件用独立的存储命名空间，避免不同页面之间串数据（标注 / 标题缓存）
  const NS = 'prototype:' + (location.pathname.split('/').pop() || 'index');
  const KEY = NS + ':annotations';
  let annoMode = false;
  let pins = load();

  const body = document.body;
  const toggleBtn = document.getElementById('annoToggle');
  const countEl = document.getElementById('annoCount');

  // ---------- 持久化 ----------
  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; }
    catch (e) { return []; }
  }
  function save() {
    localStorage.setItem(KEY, JSON.stringify(pins));
    countEl.textContent = pins.length;
  }

  // ---------- 识别点击位置所属的页面 & 锚点 ----------
  function describeTarget(el, screen) {
    // 页面名：取该 .screen 所在 .stage 的标签
    const stage = screen.closest('.stage');
    const pageName = stage ? stage.querySelector('.stage-label').textContent.trim() : '页面';

    // 锚点：向上找最近的有意义元素，取其主标题/文本
    let anchor = '';
    const item = el.closest('.list-item');
    const bubble = el.closest('.bubble');
    const hero = el.closest('.chat-hero');
    const nav = el.closest('.navbar');
    const input = el.closest('.chat-input');
    // 扩展组件容器
    const tab = el.closest('.tabbar .tab');
    const product = el.closest('.product');
    const feed = el.closest('.feed-item');
    const gridItem = el.closest('.grid-item');
    const mediaItem = el.closest('.media-item');
    const search = el.closest('.searchbar');
    const cta = el.closest('.cta-bar');
    const card = el.closest('.card');

    if (item) {
      const t = item.querySelector('.t1');
      anchor = t ? t.textContent.trim() : '列表项';
    } else if (bubble) {
      anchor = '对话气泡:' + bubble.textContent.replace(/\s+/g, ' ').trim().slice(0, 14) + '…';
    } else if (hero) {
      anchor = '头部头像区';
    } else if (nav) {
      const title = nav.querySelector('.title');
      anchor = '导航栏' + (el.classList.contains('nav-btn') ? '按钮' : (title ? '·' + title.textContent.trim() : ''));
    } else if (input) {
      anchor = '输入栏';
    } else if (tab) {
      const lb = tab.querySelector('.tlabel');
      anchor = '底部Tab:' + (lb ? lb.textContent.trim() : '');
    } else if (product) {
      const n = product.querySelector('.pname');
      anchor = '商品:' + (n ? n.textContent.trim().slice(0, 12) : '');
    } else if (feed) {
      const n = feed.querySelector('.fname');
      anchor = 'Feed动态' + (n ? '·' + n.textContent.trim() : '');
    } else if (gridItem) {
      const lb = gridItem.querySelector('.glabel');
      anchor = '宫格入口:' + (lb ? lb.textContent.trim() : '');
    } else if (mediaItem) {
      const m = mediaItem.querySelector('.m1');
      anchor = m ? m.textContent.trim() : '媒体列表项';
    } else if (search) {
      anchor = '搜索栏';
    } else if (cta) {
      const b = el.closest('.btn');
      anchor = '底部操作:' + (b ? b.textContent.trim() : 'CTA');
    } else if (el.classList.contains('section-cap')) {
      anchor = '分组标题:' + el.textContent.trim();
    } else if (card) {
      const ct = card.querySelector('.ct');
      anchor = '卡片' + (ct ? '·' + ct.textContent.trim() : '');
    } else {
      anchor = '页面空白处';
    }
    return { pageName, anchor };
  }

  // ---------- 渲染所有图钉 ----------
  function renderAll() {
    document.querySelectorAll('.anno-pin, .anno-pop').forEach(n => n.remove());
    pins.forEach((p, i) => {
      const screen = document.querySelectorAll('.screen')[p.screenIndex];
      if (!screen) return;
      // 确保 screen 是定位上下文
      if (getComputedStyle(screen).position === 'static') screen.style.position = 'relative';
      const pin = document.createElement('div');
      pin.className = 'anno-pin';
      pin.dataset.index = i;
      pin.textContent = i + 1;
      pin.style.left = p.xPct + '%';
      pin.style.top = p.yPct + '%';
      pin.title = p.anchor;
      pin.addEventListener('click', (e) => { e.stopPropagation(); openPop(pin, i); });
      screen.appendChild(pin);
    });
  }

  // 提交当前打开的气泡：写回内容；若内容为空则连同图钉一起删除（空标注不保留）
  // 返回 true 表示确实有气泡被处理
  function commitOpenPop() {
    const pop = document.querySelector('.anno-pop');
    if (!pop) return false;
    const idx = +pop.dataset.index;
    const ta = pop.querySelector('textarea');
    const val = ta ? ta.value.trim() : '';
    pop.remove();
    if (pins[idx] !== undefined) {
      if (val === '') {
        // 空内容 —— 移除这条标注
        pins.splice(idx, 1);
        save();
        renderAll();
      } else {
        pins[idx].note = val;
        save();
      }
    }
    return true;
  }

  // 把弹窗定位到图钉附近（文档坐标）；超出视口右/下边缘时翻转，保证完整可见
  function positionPop(pop, pin) {
    const pr = pin.getBoundingClientRect();
    const sx = window.scrollX, sy = window.scrollY;
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    const gap = 10;
    // 默认放在图钉下方、水平居中对齐图钉中心
    let left = pr.left + sx + pr.width / 2 - pw / 2;
    let top = pr.bottom + sy + gap;
    // 右/左溢出修正
    const maxLeft = sx + document.documentElement.clientWidth - pw - 8;
    if (left > maxLeft) left = maxLeft;
    if (left < sx + 8) left = sx + 8;
    // 下方放不下则翻到上方
    if (pr.bottom + gap + ph > document.documentElement.clientHeight) {
      top = pr.top + sy - ph - gap;
    }
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
  }

  // ---------- 打开注释气泡 ----------
  function openPop(pin, index) {
    document.querySelectorAll('.anno-pop').forEach(n => n.remove());
    const p = pins[index];
    const pop = document.createElement('div');
    pop.className = 'anno-pop';
    pop.dataset.index = index;
    pop.innerHTML =
      '<div class="meta">#' + (index + 1) + ' · ' + p.pageName + ' / ' + p.anchor + '</div>' +
      '<textarea placeholder="写下你的修改 / 新增想法…（留空将自动删除此标注）"></textarea>' +
      '<div class="row"><button class="del"><i data-lucide="trash-2"></i>删除</button><button class="save">保存</button></div>';
    // 挂到 body，脱离页面卡片的 overflow 裁切
    document.body.appendChild(pop);
    positionPop(pop, pin);
    if (window.lucide) lucide.createIcons({ nodes: [pop.querySelector('[data-lucide]')] });
    const ta = pop.querySelector('textarea');
    ta.value = p.note || '';
    ta.focus();
    pop.addEventListener('click', e => e.stopPropagation());
    pop.querySelector('.save').addEventListener('click', (e) => {
      e.stopPropagation();
      commitOpenPop();
    });
    pop.querySelector('.del').addEventListener('click', (e) => {
      e.stopPropagation();
      pop.remove();
      pins.splice(index, 1);
      save();
      renderAll();
    });
  }

  // ---------- 点击页面新增图钉 ----------
  function onScreenClick(e) {
    if (!annoMode) return;
    if (spaceDown || panning) return;   // 空格抓手平移时不落图钉

    // 点在已有图钉或正在编辑的气泡内 —— 交给它们自己处理，不新增
    if (e.target.closest('.anno-pin') || e.target.closest('.anno-pop')) return;

    // 若当前有气泡正在编辑：这次点击只用于“保存并收起”，不新增图钉
    if (commitOpenPop()) {
      e.preventDefault();
      e.stopPropagation();
      return;
    }

    const screen = e.target.closest('.screen');
    if (!screen) return;
    e.preventDefault();
    e.stopPropagation();

    const screens = Array.from(document.querySelectorAll('.screen'));
    const rect = screen.getBoundingClientRect();
    const xPct = ((e.clientX - rect.left) / rect.width) * 100;
    const yPct = ((e.clientY - rect.top) / rect.height) * 100;
    const { pageName, anchor } = describeTarget(e.target, screen);

    pins.push({
      screenIndex: screens.indexOf(screen),
      pageName, anchor,
      xPct: +xPct.toFixed(2),
      yPct: +yPct.toFixed(2),
      note: ''
    });
    save();
    renderAll();
    // 自动打开刚新增那一条的输入框（按 data-index 精确定位，不靠 DOM 顺序）
    const newIdx = pins.length - 1;
    const newPin = document.querySelector('.anno-pin[data-index="' + newIdx + '"]');
    if (newPin) openPop(newPin, newIdx);
  }

  // ---------- 工具栏 ----------
  toggleBtn.addEventListener('click', () => {
    annoMode = !annoMode;
    body.classList.toggle('anno-on', annoMode);
    toggleBtn.classList.toggle('active', annoMode);
    toggleBtn.textContent = annoMode ? '✎ 标注模式：开' : '✎ 标注模式：关';
  });

  document.addEventListener('click', onScreenClick, true);

  // ---------- 导出 ----------
  const mask = document.getElementById('annoMask');
  const out = document.getElementById('annoOut');

  function buildExport() {
    if (!pins.length) return '（暂无标注）';
    const fileName = location.pathname.split('/').pop() || '原型文件';
    let s = '我在原型页面上做了如下标注，请据此更新 ' + fileName + '：\n\n';
    pins.forEach((p, i) => {
      s += '[#' + (i + 1) + '] 页面：' + p.pageName +
           ' | 锚点：' + p.anchor +
           ' | 位置：' + p.xPct + '%,' + p.yPct + '%\n' +
           '     想法：' + (p.note || '（未填写）') + '\n';
    });
    return s;
  }

  document.getElementById('annoExport').addEventListener('click', () => {
    const text = buildExport();
    out.value = text;
    mask.classList.add('show');
    if (navigator.clipboard) navigator.clipboard.writeText(text).catch(() => {});
  });
  document.getElementById('annoCopy').addEventListener('click', () => {
    out.select();
    if (navigator.clipboard) navigator.clipboard.writeText(out.value).catch(() => {});
    else document.execCommand('copy');
  });
  document.getElementById('annoClose').addEventListener('click', () => mask.classList.remove('show'));
  mask.addEventListener('click', (e) => { if (e.target === mask) mask.classList.remove('show'); });

  document.getElementById('annoClear').addEventListener('click', () => {
    if (confirm('清空所有标注？')) { pins = []; save(); renderAll(); }
  });

  // ---------- 下载整页截图 ----------
  // 截图目标是 .canvas（它的尺寸 = 全部页面的真实宽高），而非 document.body
  // （body 宽度受视口限制，横向溢出的页面会被裁掉，导致只下载到一部分）
  const shotBtn = document.getElementById('annoShot');
  shotBtn.addEventListener('click', async () => {
    if (!window.html2canvas) { alert('截图库尚未加载完成，请稍候重试'); return; }
    const toolbar = document.querySelector('.anno-toolbar');
    const target = document.querySelector('.canvas') || document.body;
    const prevText = shotBtn.textContent;
    shotBtn.textContent = '生成中…';
    shotBtn.disabled = true;
    toolbar.style.visibility = 'hidden';   // 不要把工具栏拍进去
    // 记录并临时清除滚动，避免 html2canvas 因滚动偏移裁切内容
    const sx = window.scrollX, sy = window.scrollY;
    window.scrollTo(0, 0);
    // 背景还原：页面背景的径向渐变定义在 body 上，而截图目标是 .canvas（自身无背景），
    // 且 body 的 backgroundColor 计算值是透明（渐变属 background-image）。
    // 截图前临时把同款渐变铺到 .canvas 上，截完恢复，保证下载图与网页观感一致。
    const prevBg = target.style.background;
    target.style.background = 'radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg) 60%)';
    // 截图前临时取消缩放，保证导出永远是 1:1 全分辨率（html2canvas 对 transform 支持不稳）
    const prevTransform = target.style.transform;
    target.style.transform = 'none';
    try {
      // 用目标的完整尺寸（含溢出视口的部分）
      const fullW = Math.ceil(target.scrollWidth);
      const fullH = Math.ceil(target.scrollHeight);
      const canvas = await html2canvas(target, {
        backgroundColor: '#f3f4f6',        // 渐变兜底色（= --bg），html2canvas 渲染渐变失败时也不至于透明/黑
        scale: 2,                          // 2x 高清
        useCORS: true,
        width: fullW,
        height: fullH,
        windowWidth: fullW,
        windowHeight: fullH,
        scrollX: 0,
        scrollY: 0
      });
      const link = document.createElement('a');
      const titleEl = document.getElementById('docTitle');
      const fname = (titleEl ? titleEl.textContent.trim() : '原型线框图').replace(/[\\/:*?"<>|]/g, '');
      link.download = (fname || '原型线框图') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (err) {
      console.error(err);
      alert('截图失败：' + err.message);
    } finally {
      target.style.background = prevBg;    // 恢复 .canvas 原背景
      target.style.transform = prevTransform;   // 恢复缩放
      window.scrollTo(sx, sy);
      toolbar.style.visibility = '';
      shotBtn.textContent = prevText;
      shotBtn.disabled = false;
    }
  });

  // ---------- 可编辑标题 / 副标题（点击编辑，失焦保存，刷新恢复） ----------
  const TITLE_KEY = NS + ':doc-title';
  const SUB_KEY = NS + ':doc-subtitle';
  function bindEditable(el, storeKey) {
    if (!el) return;
    // 恢复已保存内容（允许为空：保存过空串也照样应用）
    const saved = localStorage.getItem(storeKey);
    if (saved !== null) el.textContent = saved;
    // 失焦保存（允许全空，可全部删除）
    el.addEventListener('blur', () => {
      localStorage.setItem(storeKey, el.textContent.trim());
    });
    // 回车 = 完成编辑（不换行）
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    });
  }
  bindEditable(document.getElementById('docTitle'), TITLE_KEY);
  bindEditable(document.getElementById('docSubtitle'), SUB_KEY);

  // ---------- 分支连接器：按真实 DOM 坐标绘制折线 + 箭头 + 标注 ----------
  // 支持任意行数、任意位置分叉、嵌套。对每个 .flow.branched 独立绘制。
  const SVGNS = 'http://www.w3.org/2000/svg';
  function drawForks() {
    document.querySelectorAll('.flow.branched').forEach(flow => {
      const origin = flow.querySelector(':scope > .stage.origin');
      const branches = flow.querySelector(':scope > .branches');
      if (!origin || !branches) return;

      // overlay（SVG 画线）与 tag 容器，复用或新建
      let overlay = flow.querySelector(':scope > .fork-overlay');
      if (!overlay) {
        overlay = document.createElementNS(SVGNS, 'svg');
        overlay.setAttribute('class', 'fork-overlay');
        flow.appendChild(overlay);
      }
      flow.querySelectorAll(':scope > .fork-tag').forEach(n => n.remove());
      while (overlay.firstChild) overlay.removeChild(overlay.firstChild);

      const fb = flow.getBoundingClientRect();
      overlay.setAttribute('viewBox', `0 0 ${fb.width} ${fb.height}`);
      overlay.setAttribute('width', fb.width);
      overlay.setAttribute('height', fb.height);

      // 起点：origin 右边缘中点（相对 flow 本地坐标）。
      // GAP：折线头尾与页面之间的留白，对齐普通箭头两端（约 7px）的观感。
      const GAP = 7;
      const orb = origin.getBoundingClientRect();
      const startX = orb.right - fb.left + GAP;   // 起点离开 origin 右缘 GAP
      const startY = orb.top + orb.height / 2 - fb.top;

      // 分叉中段 X：起点与第一行页面之间的中点
      const rows = branches.querySelectorAll(':scope > .branch');
      if (!rows.length) return;
      // 各行入口页面（第一个 .screen）的左边缘中点
      const targets = [];
      rows.forEach(row => {
        const screen = row.querySelector('.screen');
        if (!screen) return;
        const sb = screen.getBoundingClientRect();
        targets.push({
          x: sb.left - fb.left,
          y: sb.top + sb.height / 2 - fb.top,
          tag: row.getAttribute('data-tag') || ''
        });
      });
      if (!targets.length) return;

      const ARROW = 6;                 // 箭头头长度，与标准箭头观感一致
      // 分叉点靠近 origin（距起点 36px），使每行的水平入口线尽量长——
      // 标注浮在这段长横线上方就有充足空间完整显示，不与垂直主干/相邻行重叠。
      const midX = startX + 36;

      function addPath(d) {
        const p = document.createElementNS(SVGNS, 'path');
        p.setAttribute('d', d);
        p.setAttribute('stroke-linecap', 'round');
        p.setAttribute('stroke-linejoin', 'round');
        overlay.appendChild(p);
      }

      // 主干：起点水平到分叉点
      addPath(`M ${startX} ${startY} H ${midX}`);
      // 垂直贯穿：从最上行到最下行（在 midX 处）
      const ys = targets.map(t => t.y);
      addPath(`M ${midX} ${Math.min(...ys, startY)} V ${Math.max(...ys, startY)}`);
      // 每行：midX 水平到该行入口前（留出箭头），再画箭头头
      targets.forEach(t => {
        const tipX = t.x - GAP;           // 箭头尖端距页面左缘 GAP，与普通箭头头尾留白一致
        addPath(`M ${midX} ${t.y} H ${tipX}`);
        addPath(`M ${tipX - ARROW} ${t.y - 4} L ${tipX} ${t.y} L ${tipX - ARROW} ${t.y + 4}`);
        // 标注：紧贴分叉点、置于水平入口线左端上方，距线 10px（与普通箭头 tag↔line 间距一致）
        if (t.tag) {
          const tag = document.createElement('div');
          tag.className = 'fork-tag';
          tag.textContent = t.tag;
          tag.style.left = (midX + 8) + 'px';
          tag.style.top = (t.y - 10) + 'px';
          flow.appendChild(tag);
        }
      });
    });
  }
  // ---------- 跨页连线 drawXlinks：任意两页框之间画正交折线 + 箭头 + tag ----------
  // 支持多条 xlink 指向同一个目标（天然汇聚）。声明：
  //   <div class="xlink" data-from="srcId" data-to="dstId" data-tag="说明"
  //        data-side="auto|right|left|top|bottom" data-dash="1"></div>
  // 坐标全部相对 .canvas 本地坐标系（.canvas 已 position:relative）。
  function drawXlinks() {
    const canvas = document.querySelector('.canvas');
    if (!canvas) return;
    const defs = Array.from(document.querySelectorAll('.xlink'));
    // overlay 与 tag 容器：复用或新建
    let overlay = canvas.querySelector(':scope > .xlink-overlay');
    if (!overlay) {
      overlay = document.createElementNS(SVGNS, 'svg');
      overlay.setAttribute('class', 'xlink-overlay');
      canvas.appendChild(overlay);
    }
    canvas.querySelectorAll(':scope > .xlink-tag').forEach(n => n.remove());
    while (overlay.firstChild) overlay.removeChild(overlay.firstChild);
    if (!defs.length) return;

    const cb = canvas.getBoundingClientRect();
    overlay.setAttribute('viewBox', `0 0 ${cb.width} ${cb.height}`);
    overlay.setAttribute('width', cb.width);
    overlay.setAttribute('height', cb.height);

    const GAP = 8, ARROW = 6;
    // 某元素相对 canvas 的矩形
    const rectOf = (el) => {
      const r = el.getBoundingClientRect();
      return { x: r.left - cb.left, y: r.top - cb.top, w: r.width, h: r.height,
               cx: r.left - cb.left + r.width / 2, cy: r.top - cb.top + r.height / 2 };
    };
    const addPath = (d, dashed) => {
      const p = document.createElementNS(SVGNS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('stroke-linecap', 'round');
      p.setAttribute('stroke-linejoin', 'round');
      if (dashed) p.setAttribute('class', 'dashed');
      overlay.appendChild(p);
      return p;
    };
    const addArrow = (x, y, dir) => {
      // dir: 'r'|'l'|'d'|'u' —— 箭头尖指向的方向
      let d;
      if (dir === 'r') d = `M ${x-ARROW} ${y-4} L ${x} ${y} L ${x-ARROW} ${y+4}`;
      else if (dir === 'l') d = `M ${x+ARROW} ${y-4} L ${x} ${y} L ${x+ARROW} ${y+4}`;
      else if (dir === 'd') d = `M ${x-4} ${y-ARROW} L ${x} ${y} L ${x+4} ${y-ARROW}`;
      else d = `M ${x-4} ${y+ARROW} L ${x} ${y} L ${x+4} ${y+ARROW}`;
      addPath(d);
    };

    defs.forEach(def => {
      const from = document.getElementById(def.dataset.from || '');
      const to = document.getElementById(def.dataset.to || '');
      if (!from || !to) return;
      const a = rectOf(from), b = rectOf(to);
      const dashed = def.dataset.dash === '1';
      const side = def.dataset.side || 'auto';

      // 选择出/入边：auto 时按相对位置决定（目标在右→源右出/目标左入，反之亦然；
      // 若主要是上下关系则走 top/bottom）。
      let mode = side;
      if (mode === 'auto') {
        const dx = b.cx - a.cx, dy = b.cy - a.cy;
        if (Math.abs(dx) >= Math.abs(dy)) mode = dx >= 0 ? 'right' : 'left';
        else mode = dy >= 0 ? 'bottom' : 'top';
      }

      let sx, sy, tx, ty, midpts, arrowDir;
      if (mode === 'right' || mode === 'left') {
        const goRight = mode === 'right';
        sx = goRight ? a.x + a.w + GAP : a.x - GAP;
        sy = a.cy;
        tx = goRight ? b.x - GAP : b.x + b.w + GAP;
        ty = b.cy;
        const mx = (sx + tx) / 2;             // 折线中段 x（两页之间）
        addPath(`M ${sx} ${sy} H ${mx} V ${ty} H ${tx}`, dashed);
        arrowDir = goRight ? 'r' : 'l';
        // tag 锚在源侧水平段（紧贴出发页，距源边 1/4 处），多条汇聚也不会在目标处叠字
        midpts = { x: sx + (mx - sx) * 0.5, y: sy - 9 };
      } else {
        const goDown = mode === 'bottom';
        sx = a.cx;
        sy = goDown ? a.y + a.h + GAP : a.y - GAP;
        tx = b.cx;
        ty = goDown ? b.y - GAP : b.y + b.h + GAP;
        const my = (sy + ty) / 2;
        addPath(`M ${sx} ${sy} V ${my} H ${tx} V ${ty}`, dashed);
        arrowDir = goDown ? 'd' : 'u';
        midpts = { x: (sx + tx) / 2, y: my };
      }
      addArrow(tx, ty, arrowDir);

      if (def.dataset.tag) {
        const tag = document.createElement('div');
        tag.className = 'xlink-tag';
        tag.textContent = def.dataset.tag;
        tag.style.left = midpts.x + 'px';
        tag.style.top = midpts.y + 'px';
        canvas.appendChild(tag);
      }
    });
  }

  // ---------- 画布缩放 ----------
  // 机制：缩放用 CSS transform: scale(Z) 作用在 .canvas 上；.zoom-stage 的尺寸 = 画布原始尺寸 × Z，
  // 让 body 滚动条跟随缩放后的视觉大小。连线(drawForks/drawXlinks)用 getBoundingClientRect 实测像素，
  // 若在缩放态下测量，写入 SVG/tag 的像素会被 transform 二次缩放而错位——故 redrawConnectors 总是
  // 先把 transform 设回 none、在 1:1 坐标系下绘制、再恢复 scale(Z)，连线随整体均匀缩放，永不错位。
  const stage = document.querySelector('.zoom-stage');
  const canvas = document.querySelector('.canvas');
  const Z_MIN = 0.25, Z_MAX = 2, Z_STEP = 1.2;
  let Z = 1;
  const zoomPctEl = document.getElementById('zoomPct');
  const clampZ = (z) => Math.min(Z_MAX, Math.max(Z_MIN, z));

  // 在 1:1 坐标系下重画连线，再恢复当前缩放
  function redrawConnectors() {
    if (canvas) canvas.style.transform = 'none';
    drawForks();
    drawXlinks();
    if (canvas) canvas.style.transform = 'scale(' + Z + ')';
  }

  // 应用当前 Z：设 transform、按未缩放布局尺寸×Z 撑出 stage、刷新百分比、重画连线
  function applyZoom() {
    if (!canvas || !stage) return;
    // offsetWidth/Height 取未缩放的布局尺寸（transform 不影响 offset 尺寸）
    const w = canvas.offsetWidth, h = canvas.offsetHeight;
    canvas.style.transform = 'scale(' + Z + ')';
    stage.style.width = (w * Z) + 'px';
    stage.style.height = (h * Z) + 'px';
    if (zoomPctEl) zoomPctEl.textContent = Math.round(Z * 100) + '%';
    redrawConnectors();
  }

  // 以某个视口点(cx,cy)为锚缩放：调整滚动，使该点下的内容保持不动
  function zoomTo(newZ, cx, cy) {
    newZ = clampZ(newZ);
    if (newZ === Z) return;
    if (cx == null) { cx = window.innerWidth / 2; cy = window.innerHeight / 2; }
    const ratio = newZ / Z;
    // stage 在文档中的左上角（缩放前）
    const sr = stage.getBoundingClientRect();
    const originX = sr.left + window.scrollX;
    const originY = sr.top + window.scrollY;
    // 锚点在 stage 内的文档坐标
    const px = window.scrollX + cx - originX;
    const py = window.scrollY + cy - originY;
    Z = newZ;
    applyZoom();
    // 缩放后让同一内容点回到光标下
    const ns = stage.getBoundingClientRect();
    const nOriginX = ns.left + window.scrollX;
    const nOriginY = ns.top + window.scrollY;
    window.scrollTo(nOriginX + px * ratio - cx, nOriginY + py * ratio - cy);
  }

  // 适应屏幕：缩到整张流程图铺满窗口宽度（不放大，只在过宽时缩小）
  function zoomFit() {
    if (!canvas) return;
    const w = canvas.offsetWidth || 1;
    Z = clampZ(Math.min(1, (window.innerWidth - 32) / w));
    applyZoom();
    window.scrollTo(0, 0);
  }

  document.getElementById('zoomIn').addEventListener('click', () => zoomTo(Z * Z_STEP));
  document.getElementById('zoomOut').addEventListener('click', () => zoomTo(Z / Z_STEP));
  document.getElementById('zoomPct').addEventListener('click', () => zoomTo(1));
  document.getElementById('zoomFit').addEventListener('click', zoomFit);

  // Ctrl/⌘ + 滚轮缩放；Mac 触控板双指捏合在浏览器中同样是带 ctrlKey 的 wheel 事件，天然覆盖。
  // 系数越大越跟手：触控板捏合(deltaY 小)用更高灵敏度，鼠标滚轮(deltaY 大、常为整十)适当压一压避免一格跳太多。
  window.addEventListener('wheel', (e) => {
    if (!(e.ctrlKey || e.metaKey)) return;
    e.preventDefault();
    // |deltaY|<50 视为触控板捏合，给高灵敏度；否则按鼠标滚轮处理，钳住单次步进上限手感更稳
    const fine = Math.abs(e.deltaY) < 50;
    const k = fine ? 0.012 : 0.0028;
    let d = e.deltaY;
    if (!fine) d = Math.max(-120, Math.min(120, d));   // 限制鼠标滚轮单格跳变
    zoomTo(Z * Math.exp(-d * k), e.clientX, e.clientY);
  }, { passive: false });

  // ---------- 类 Figma：按住空格拖动画布查看 ----------
  // 空格按下进入「抓手」态（grab 光标、临时屏蔽页面点击）；按下鼠标后拖动 = 反向滚动视口。
  let spaceDown = false, panning = false, panX = 0, panY = 0;
  // 编辑标题/写标注时不抢空格（光标在输入框里要能正常打空格）
  const inEditable = (el) => !!(el && (el.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName)));
  window.addEventListener('keydown', (e) => {
    if (e.code !== 'Space' || inEditable(e.target)) return;
    // 每次空格 keydown 都 preventDefault —— 长按时浏览器会 auto-repeat 持续触发 keydown，
    // 若只在首次拦截，后续重复事件会让「空格=翻页下滚」的默认行为生效，与拖拽打架。
    e.preventDefault();
    if (spaceDown) return;                     // 状态只初始化一次
    spaceDown = true;
    document.body.classList.add('space-pan');
  });
  window.addEventListener('keyup', (e) => {
    if (e.code !== 'Space') return;
    spaceDown = false; panning = false;
    document.body.classList.remove('space-pan', 'space-panning');
  });
  window.addEventListener('mousedown', (e) => {
    if (!spaceDown) return;
    panning = true; panX = e.clientX; panY = e.clientY;
    e.preventDefault();
    document.body.classList.add('space-panning');
  }, true);                                   // 捕获阶段，抢在页面点击/标注落点之前
  window.addEventListener('mousemove', (e) => {
    if (!panning) return;
    window.scrollBy(panX - e.clientX, panY - e.clientY);
    panX = e.clientX; panY = e.clientY;
  });
  window.addEventListener('mouseup', () => {
    if (!panning) return;
    panning = false;
    document.body.classList.remove('space-panning');
  }, true);
  // 失焦时复位，避免「按着空格切走再回来」卡在抓手态
  window.addEventListener('blur', () => {
    spaceDown = false; panning = false;
    document.body.classList.remove('space-pan', 'space-panning');
  });

  // 布局稳定后绘制；窗口缩放、字体/图标加载后重绘（缩放态下也会经 applyZoom 重算 stage 尺寸 + 连线）
  function scheduleDrawForks() { requestAnimationFrame(() => requestAnimationFrame(() => applyZoom())); }
  window.addEventListener('resize', scheduleDrawForks);
  window.addEventListener('load', scheduleDrawForks);

  // ---------- 图标急救：检测图标库是否加载失败，失败则浮现求助入口 ----------
  // 原理：Lucide 成功时会把 <i data-lucide> 全部替换成 <svg>；若失败，<i> 会残留，
  // 或 window.lucide 根本不存在。任一成立即判定“图标坏了”，显示右下角问号。
  function checkIconsBroken() {
    const leftover = document.querySelector('.screen i[data-lucide]');   // 仍残留未渲染的占位
    const broken = !window.lucide || !!leftover;
    document.body.classList.toggle('icons-broken', broken);
    return broken;
  }
  // 加载后给 CDN 一点渲染时间，再判定（多次复查，覆盖慢网下姗姗来迟的情况）
  window.addEventListener('load', () => {
    checkIconsBroken();
    setTimeout(checkIconsBroken, 1200);
    setTimeout(checkIconsBroken, 4000);
  });

  // 点击问号：复制一段口语化修复指令到剪贴板
  const SOS_TEXT =
    '我这个原型页面的图标没有正常显示出来（它们依赖的在线图标库没加载出来）。' +
    '请把这个 HTML 文件里的图标改成内联 SVG 的方式：找到所有带 data-lucide="名字" 的元素，' +
    '用对应的 Lucide 官方 SVG 把它们替换掉，并删除 lucide 的 CDN <script> 和 createIcons() 调用。' +
    '改完之后请保证它仍然是一个可以离线打开的单文件 HTML，图标永远不会再加载失败。';
  const sosBtn = document.getElementById('iconSosBtn');
  if (sosBtn) {
    sosBtn.addEventListener('click', () => {
      const done = () => {
        const prev = sosBtn.textContent;
        sosBtn.textContent = '✓';
        sosBtn.style.color = 'var(--ink)';
        setTimeout(() => { sosBtn.textContent = prev; sosBtn.style.color = ''; }, 1600);
        alert('已复制一段修复说明到剪贴板，粘贴到与 AI 的对话框发送即可，AI 会把图标改成内联、永久修复。');
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(SOS_TEXT).then(done).catch(() => { window.prompt('请手动复制下面这段话发给 AI：', SOS_TEXT); });
      } else {
        window.prompt('请手动复制下面这段话发给 AI：', SOS_TEXT);
      }
    });
  }

  // ---------- 初始化 ----------
  save();
  renderAll();
  applyZoom();          // 同步设好 stage 尺寸，避免绝对定位的 canvas 让 stage 首帧塌缩
  scheduleDrawForks();
})();
</script>

<!-- 截图库 -->
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- Lucide 图标库 -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  // 将所有 data-lucide 占位符渲染为 SVG 图标
  if (window.lucide) lucide.createIcons();
  // 图标渲染后通知重绘分支连线（尺寸可能微变）
  window.dispatchEvent(new Event('resize'));
</script>

</body>
</html>
